<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" width="100%" height="100%">
  <defs>
    <!-- Glow filter for Bat symbol and terminals -->
    <filter id="bat-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    
    .terminal-bg {
      fill: #060606;
      stroke: rgba(255, 215, 0, 0.2);
      stroke-width: 1.5;
      rx: 12px;
    }
    
    .code-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      fill: #ffd700;
    }
    
    .prompt {
      fill: #ffd700;
      font-weight: bold;
    }
    
    .output-ok {
      fill: #a1a1aa;
    }
    
    .output-info {
      fill: #f59e0b;
    }
    
    .output-sys {
      fill: #ffffff;
      font-weight: bold;
    }

    .cursor {
      fill: #ffd700;
      animation: blink 0.8s infinite;
    }

    /* Animation Timings */
    .line-1 { animation: fadeInLine 10s steps(1) infinite; }
    .line-2 { animation: fadeInLine2 10s steps(1) infinite; }
    .line-3 { animation: fadeInLine3 10s steps(1) infinite; }
    .line-4 { animation: fadeInLine4 10s steps(1) infinite; }
    .line-5 { animation: fadeInLine5 10s steps(1) infinite; }
    .line-6 { animation: fadeInLine6 10s steps(1) infinite; }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes fadeInLine {
      0%, 100% { opacity: 0; }
      5%, 95% { opacity: 1; }
    }
    @keyframes fadeInLine2 {
      0%, 100% { opacity: 0; }
      18%, 95% { opacity: 1; }
    }
    @keyframes fadeInLine3 {
      0%, 100% { opacity: 0; }
      35%, 95% { opacity: 1; }
    }
    @keyframes fadeInLine4 {
      0%, 100% { opacity: 0; }
      52%, 95% { opacity: 1; }
    }
    @keyframes fadeInLine5 {
      0%, 100% { opacity: 0; }
      70%, 95% { opacity: 1; }
    }
    @keyframes fadeInLine6 {
      0%, 100% { opacity: 0; }
      85%, 95% { opacity: 1; }
    }

    .bat-path {
      fill: #ffd700;
      animation: pulseBat 4s ease-in-out infinite alternate;
    }

    @keyframes pulseBat {
      0% {
        fill: #d4af37;
        filter: drop-shadow(0 0 2px rgba(255, 215, 0, 0.2));
      }
      100% {
        fill: #ffd700;
        filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.7));
      }
    }

    .radar-circle {
      stroke: rgba(255, 215, 0, 0.15);
      stroke-width: 1;
      fill: none;
      transform-origin: 100px 130px;
    }

    .radar-sweep {
      fill: url(#radar-grad);
      transform-origin: 100px 130px;
      animation: rotateRadar 6s linear infinite;
    }

    @keyframes rotateRadar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <linearGradient id="radar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
    <stop offset="50%" stop-color="#ffd700" stop-opacity="0.02"/>
    <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
  </linearGradient>

  <!-- Container Box -->
  <rect class="terminal-bg" width="818" height="258" x="1" y="1"/>

  <!-- Left: Batcomputer Interface / Radar Visual -->
  <g class="radar-visual">
    <!-- Radar Grid Circles -->
    <circle cx="100" cy="130" r="80" class="radar-circle"/>
    <circle cx="100" cy="130" r="55" class="radar-circle"/>
    <circle cx="100" cy="130" r="30" class="radar-circle"/>
    
    <!-- Crosshairs -->
    <line x1="100" y1="40" x2="100" y2="220" stroke="rgba(255, 215, 0, 0.15)" stroke-width="1"/>
    <line x1="10" y1="130" x2="190" y2="130" stroke="rgba(255, 215, 0, 0.15)" stroke-width="1"/>
    
    <!-- Radar Sweep -->
    <path d="M 100 130 L 100 50 A 80 80 0 0 1 180 130 Z" class="radar-sweep"/>

    <!-- Glowing Nolan Bat Logo Symbol (Symmetric and Sharp) -->
    <path d="M 100 102
             L 105 96
             L 106 108
             L 122 108
             L 168 114
             L 168 122
             L 144 133
             L 130 145
             L 116 138
             L 100 160
             L 84 138
             L 70 145
             L 56 133
             L 32 122
             L 32 114
             L 78 108
             L 94 108
             L 95 96
             Z" 
          class="bat-path" 
          filter="url(#bat-glow)"/>
  </g>

  <!-- Divider Line -->
  <line x1="200" y1="20" x2="200" y2="240" stroke="rgba(255, 215, 0, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Right: Batcomputer Console Logging -->
  <g transform="translate(225, 25)">
    <!-- Header info -->
    <text x="0" y="15" class="code-text" fill="#888888" font-size="12">BATCOMPUTER SECURE TERMINAL // HOST: BATCAVE_NET</text>
    <line x1="0" y1="25" x2="550" y2="25" stroke="rgba(255, 215, 0, 0.15)" stroke-width="1"/>

    <!-- Dynamic Code / Log lines -->
    <!-- Line 1 -->
    <g class="line-1" transform="translate(0, 50)">
      <text x="0" y="0" class="code-text prompt">JaynthReddy91@batcave:~$ </text>
      <text x="195" y="0" class="code-text">init_secure_shell.sh</text>
    </g>

    <!-- Line 2 -->
    <g class="line-2" transform="translate(0, 75)">
      <text x="0" y="0" class="code-text output-sys">[SYS] Connecting to Batcave secure mainframe...</text>
      <text x="460" y="0" class="code-text output-ok">OK</text>
    </g>

    <!-- Line 3 -->
    <g class="line-3" transform="translate(0, 100)">
      <text x="0" y="0" class="code-text output-sys">[CRYPT] Loading quantum encryption keys...</text>
      <text x="400" y="0" class="code-text" fill="#00ffcc">ACTIVE (256-bit)</text>
    </g>

    <!-- Line 4 -->
    <g class="line-4" transform="translate(0, 125)">
      <text x="0" y="0" class="code-text output-sys">[NET] Monitoring local network traffic...</text>
      <text x="360" y="0" class="code-text output-info">0 THREATS DETECTED</text>
    </g>

    <!-- Line 5 -->
    <g class="line-5" transform="translate(0, 150)">
      <text x="0" y="0" class="code-text output-sys">[BAT] Deploying tactical sonar tracking...</text>
      <text x="390" y="0" class="code-text" fill="#ffd700">ONLINE</text>
    </g>

    <!-- Line 6 -->
    <g class="line-6" transform="translate(0, 175)">
      <text x="0" y="0" class="code-text prompt">JaynthReddy91@batcave:~$ </text>
      <rect x="195" y="-12" width="8" height="15" class="cursor"/>
    </g>
  </g>
</svg>
